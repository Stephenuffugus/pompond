<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3FA7A1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pom Pond">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-180.png">
<title>Pom Pond</title>
<meta name="description" content="Do chores, be kind, earn Poms вҖ” and grow a pond full of collectible critters.">
<meta property="og:type" content="website">
<meta property="og:title" content="Pom Pond">
<meta property="og:description" content="Do chores, be kind, earn Poms вҖ” and grow a pond full of collectible critters.">
<meta property="og:image" content="https://pom-pond.web.app/icons/icon-512.png">
<meta property="og:url" content="https://pom-pond.web.app/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Pom Pond">
<meta name="twitter:description" content="Do chores, be kind, earn Poms вҖ” and grow a pond full of collectible critters.">
<meta name="twitter:image" content="https://pom-pond.web.app/icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E9F4F1; --bg2:#F4FBF8; --ink:#23413E; --soft:#5E807B;
    --card:#FFFFFF; --line:#D4E7E1; --accent:#3FA7A1; --gold:#FFC24B;
    --shadow:0 14px 30px -12px rgba(30,80,75,.30);
    --display:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{
    font-family:var(--body);color:var(--ink);min-height:100vh;
    background:
      radial-gradient(120% 80% at 0% 0%, #D7EFE8 0%, transparent 55%),
      radial-gradient(120% 80% at 100% 0%, #E8F6C9 0%, transparent 50%),
      radial-gradient(140% 120% at 50% 120%, #CFE9F6 0%, transparent 55%),
      var(--bg);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 80px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:8px}
  .brand h1{font-family:var(--display);font-weight:700;font-size:26px;margin:0;letter-spacing:-.5px}
  .iconbtn{border:none;background:var(--card);color:var(--ink);min-width:44px;height:44px;border-radius:14px;
    font-size:15px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);padding:0 14px;
    display:inline-flex;align-items:center;gap:6px;transition:transform .12s}
  .iconbtn:active{transform:scale(.94)}
  .iconbtn.go{background:var(--accent);color:#fff}
  .label{font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase;
    color:var(--soft);margin:22px 4px 10px;display:flex;align-items:center;gap:8px}
  .label .ln{flex:1;height:1px;background:var(--line)}

  /* lobby */
  .lobby-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:8px}
  .lobby-card{width:120px;text-align:center;border:none;background:transparent;cursor:pointer;font-family:var(--body);color:var(--ink)}
  .lobby-card .disc{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;font-size:48px;margin:0 auto;
    background:var(--kc,#FFD6A5);border:4px solid #fff;box-shadow:var(--shadow);transition:transform .15s}
  .lobby-card:active .disc{transform:scale(.93)}
  .lobby-card .nm{display:block;margin-top:10px;font-weight:800;font-size:16px}
  .lobby-card .rl{display:block;font-size:12px;color:var(--soft);font-weight:700}
  .lobby-add .disc{background:rgba(255,255,255,.6);border:4px dashed var(--line);font-size:38px;color:var(--soft)}

  /* kid header */
  .me{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,var(--bg2),#fff);
    border-radius:24px;padding:16px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7)}
  .me .disc{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:34px;
    background:var(--kc,#FFD6A5);border:3px solid #fff;box-shadow:0 6px 14px -6px rgba(0,0,0,.4);flex:0 0 auto}
  .me .info{flex:1}
  .me .info h2{font-family:var(--display);font-weight:600;font-size:22px;margin:0}
  .me .palms{font-weight:800;color:var(--soft);font-size:14px}
  .me .palms b{color:var(--accent)}
  .me .palmchip{font:inherit;color:inherit;border:none;background:rgba(63,167,161,.14);border-radius:999px;
    padding:3px 9px 3px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;vertical-align:-2px;
    -webkit-tap-highlight-color:transparent}
  .me .palmchip b{color:var(--accent)}
  .me .palmchip .pchev{color:var(--accent);font-weight:900;opacity:.7;margin-left:1px}
  .me .palmchip:active{transform:scale(.95)}
  .actrow .pplus{color:var(--accent);font-weight:800;font-size:12px;white-space:nowrap;display:inline-flex;align-items:center;gap:2px}
  .actrow .pminus{color:var(--soft);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .critreason{text-align:center;font-weight:800;color:var(--ink);font-size:15px;background:var(--bg2);border-radius:14px;padding:10px 14px;margin:2px 0 14px}
  .critreason .rlbl{display:block;color:var(--soft);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  /* give-a-Pom reason picker */
  .givewrap{max-height:56vh;overflow:auto;margin:0 -2px 12px;padding:0 2px}
  .givecat{font-weight:800;font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin:13px 2px 7px}
  .givecat:first-child{margin-top:2px}
  .giverow{display:flex;flex-wrap:wrap;gap:7px}
  .givechip{border:2px solid #e3edeb;background:#fff;border-radius:13px;padding:8px 11px;font-weight:800;font-size:13px;color:var(--ink);cursor:pointer;box-shadow:0 4px 10px -8px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent}
  .givechip:active{transform:scale(.95);border-color:var(--accent);background:#eafaf8}
  .gtoggle{display:flex;gap:8px;margin:0 0 6px}
  .gtoggle button{flex:1;border:2px solid #e3edeb;background:#fff;border-radius:13px;padding:9px;font-weight:800;font-size:13px;color:var(--soft);cursor:pointer}
  .gtoggle button.on{border-color:var(--accent);background:#eafaf8;color:var(--ink)}
  .givechip .chipx{color:var(--accent);font-size:11px}

  /* buckets */
  .buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .bucket{background:var(--card);border-radius:20px;padding:14px 12px 12px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}
  .bucket .bt{font-family:var(--display);font-weight:600;font-size:14px;color:var(--soft);text-transform:uppercase;letter-spacing:.4px}
  .bucket .bn{font-size:30px;margin:4px 0 2px}
  .bucket .frac{font-weight:800;font-size:13px;color:var(--ink)}
  .pbar{height:9px;border-radius:8px;background:var(--line);margin-top:8px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#7fd3cd);border-radius:8px;transition:width .5s ease}
  .bucket.s i{background:linear-gradient(90deg,#7fd3cd,#aee5e0)}
  .bucket.m i{background:linear-gradient(90deg,#5BB1FF,#9ccfff)}
  .bucket.b i{background:linear-gradient(90deg,var(--gold),#ffd98a)}

  /* pond вҖ” layered water that actually reads like a pond */
  /* organic blob outline so it reads as a real pond, not a rounded card */
  .pond{--pondR:46% 54% 47% 53% / 61% 58% 42% 39%;margin-top:14px;border-radius:var(--pondR);min-height:320px;
    position:relative;overflow:hidden;touch-action:pan-y;
    background:
      radial-gradient(130% 85% at 50% -18%, #D6F2EE 0%, rgba(214,242,238,0) 55%),
      radial-gradient(80% 60% at 78% 18%, rgba(255,255,255,.35) 0%, transparent 45%),
      linear-gradient(180deg,#93D6D2 0%,#5FB7C6 42%,#3E92B4 78%,#2C77A0 100%);
    box-shadow:var(--shadow), inset 0 -34px 54px -22px rgba(6,34,54,.55), inset 0 16px 36px -20px rgba(255,255,255,.7);
    padding:10px;border:1px solid rgba(255,255,255,.45)}
  /* moving surface shimmer + soft caustics */
  .pond::before{content:"";position:absolute;inset:-20%;pointer-events:none;opacity:.45;
    background:repeating-linear-gradient(118deg, rgba(255,255,255,.10) 0 7px, transparent 7px 20px);
    animation:shimmer 16s linear infinite}
  @keyframes shimmer{from{transform:translateX(-60px)}to{transform:translateX(60px)}}
  /* depth vignette */
  .pond::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    box-shadow:inset 0 0 70px rgba(8,36,58,.28)}
  .pond .lily{position:absolute;font-size:28px;opacity:.9;filter:drop-shadow(0 3px 3px rgba(0,30,40,.32));
    animation:lilybob 8s ease-in-out infinite}
  @keyframes lilybob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  /* CSS lily pads вҖ” green disc with the classic V notch */
  .pond .pad{position:absolute;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #82CE93 0%, #4FA86A 55%, #3C8A57 100%);
    box-shadow:0 5px 10px -4px rgba(0,40,30,.45), inset 0 -5px 9px rgba(0,40,30,.28);
    clip-path:polygon(0 0,45% 0,50% 46%,55% 0,100% 0,100% 100%,0 100%);opacity:.96;
    animation:lilybob 9s ease-in-out infinite}
  .pond .reed{position:absolute;bottom:-6px;font-size:34px;opacity:.92;filter:drop-shadow(0 2px 2px rgba(0,30,40,.3))}
  .pond .ripple{position:absolute;width:26px;height:14px;border:2px solid rgba(255,255,255,.45);border-radius:50%;
    pointer-events:none;animation:ripple 6s ease-out infinite}
  @keyframes ripple{0%{transform:scale(.4);opacity:.0}25%{opacity:.55}100%{transform:scale(2.1);opacity:0}}
  .pond .empty{position:absolute;inset:0;display:grid;place-items:center;color:#f1fffd;font-weight:800;text-align:center;padding:20px;font-size:15px;text-shadow:0 2px 8px rgba(0,30,45,.45)}
  .critter{position:absolute;width:54px;height:54px;animation:bob 6s ease-in-out infinite;
    cursor:grab;touch-action:none;filter:drop-shadow(0 5px 4px rgba(0,40,40,.28))}
  .critter.dragging{animation:none;z-index:6;cursor:grabbing;filter:drop-shadow(0 12px 9px rgba(0,40,40,.4))}
  .critter.csel{animation:none;z-index:5;border-radius:50%;box-shadow:0 0 0 4px #fff,0 0 0 8px var(--accent)}
  /* рҹ§¬ combine */
  .combinebtn{border:none;background:rgba(63,167,161,.16);color:var(--accent);font-weight:800;font-size:13px;border-radius:999px;padding:5px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .combinebar{display:flex;align-items:center;gap:10px;background:#eafaf8;border:2px solid var(--accent);border-radius:16px;padding:10px 12px;margin-top:10px;font-weight:800;color:var(--ink);font-size:14px}
  .combinebar #combinemsg{flex:1}
  .combinebar .cbtns{display:flex;gap:8px;flex:0 0 auto}
  .combinebar button{border:none;border-radius:12px;padding:8px 13px;font-weight:800;font-size:13px;cursor:pointer}
  .combinebar #combineGo{background:var(--accent);color:#fff}
  .combinebar #combineGo:disabled{opacity:.45;cursor:default}
  .combinebar #combineCancel{background:#fff;color:var(--soft)}
  .critter::after{content:"";position:absolute;left:14%;right:14%;bottom:-7px;height:8px;border-radius:50%;
    background:rgba(6,40,56,.28);filter:blur(2px)}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
  .pondcount{position:absolute;top:9px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);border-radius:14px;padding:3px 11px;font-weight:800;font-size:12px;color:var(--ink);z-index:3}
  /* zoomable layer: everything pannable/scalable lives in the stage; badges + controls sit outside it */
  .pond-stage{position:absolute;inset:0;transform-origin:center center;will-change:transform}
  .pond.zoomed{cursor:grab;touch-action:none}
  .pond.zoomed:active{cursor:grabbing}
  .pond-zoom{position:absolute;left:10px;bottom:10px;z-index:3;display:flex;flex-direction:column;gap:7px}
  .pond-zoom .zb{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.94);color:var(--ink);
    font-size:21px;font-weight:800;line-height:1;cursor:pointer;box-shadow:0 3px 8px rgba(6,34,54,.3);
    display:grid;place-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .pond-zoom .zb:active{transform:scale(.9)}
  .pond-zoom .zb:disabled{opacity:.4;cursor:default}

  /* chore list */
  .chore-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .chore{background:var(--card);border-radius:20px;padding:14px;box-shadow:var(--shadow);cursor:pointer;text-align:left;
    border:2px solid transparent;position:relative;font-family:var(--body);color:var(--ink);transition:transform .12s}
  .chore:active{transform:scale(.97)}
  .chore .emo{font-size:28px;display:block;margin-bottom:6px}
  .chore .cn{font-weight:800;font-size:15px}
  .chore .meta{color:var(--soft);font-weight:700;font-size:12px;margin-top:3px}
  .chore .del{position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;background:#E5524B;color:#fff;border:none;font-size:16px;cursor:pointer;display:none;place-items:center;box-shadow:var(--shadow)}
  body.editing .chore .del{display:grid}
  .addc{border:2px dashed var(--line)!important;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--soft);min-height:92px}

  /* reward tokens */
  .tokens{display:flex;flex-wrap:wrap;gap:10px}
  .token{background:#fff;border-radius:16px;padding:10px 14px;box-shadow:var(--shadow);font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;border:2px solid var(--gold)}
  .token.redeemed{border-color:var(--line);opacity:.6;cursor:default}
  .token .pill{font-size:11px;text-transform:uppercase;letter-spacing:.4px;background:var(--gold);color:#5a4015;border-radius:10px;padding:1px 7px}

  /* parent rows */
  .rows{display:flex;flex-direction:column;gap:10px}
  .row{background:var(--card);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
  .row .emo{font-size:24px}
  .row .grow{flex:1}
  .row .rn{font-weight:800;font-size:15px}
  .row .rs{font-size:12px;color:var(--soft);font-weight:700}
  .row .mini{border:none;background:var(--accent);color:#fff;border-radius:11px;padding:8px 12px;font-weight:800;font-size:13px;cursor:pointer}
  .row .mini.ghost{background:#fff;color:var(--soft);box-shadow:inset 0 0 0 2px var(--line)}
  .tier-tag{font-size:11px;font-weight:800;text-transform:uppercase;border-radius:9px;padding:2px 8px}
  .t-small{background:#dff3f1;color:#2c7c76}.t-medium{background:#e1eefe;color:#2f6fb8}.t-big{background:#fff0cf;color:#9a6a14}

  /* timer overlay */
  .overlay{position:fixed;inset:0;background:rgba(20,50,48,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:40;padding:18px}
  .overlay.show{display:flex}
  .timer-card{background:linear-gradient(180deg,var(--bg2),#fff);border-radius:30px;padding:24px;width:100%;max-width:380px;text-align:center;box-shadow:0 30px 60px -20px rgba(0,0,0,.5)}
  .timer-card h3{font-family:var(--display);font-weight:600;font-size:22px;margin:0 0 12px;display:flex;gap:8px;justify-content:center}
  .ring-wrap{position:relative;width:200px;height:200px;margin:0 auto}
  svg.ring{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--line);stroke-width:15}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:15;stroke-linecap:round;transition:stroke-dashoffset .4s linear}
  .clock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .clock .time{font-family:var(--display);font-weight:600;font-size:48px;font-variant-numeric:tabular-nums}
  .clock .face{font-size:30px}
  .adjust{display:flex;justify-content:center;gap:8px;margin:12px 0}
  .adjust button{border:none;background:#fff;box-shadow:var(--shadow);border-radius:12px;padding:7px 11px;font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;color:var(--ink)}
  .timer-actions{display:flex;gap:10px;margin-top:6px}
  .timer-actions button{flex:1;border:none;border-radius:16px;padding:14px;font-family:var(--display);font-weight:600;font-size:17px;cursor:pointer;color:#fff;box-shadow:var(--shadow)}
  .ta-go{background:var(--accent)}.ta-go.run{background:#5BB98C}
  .ta-done{background:var(--gold);color:#5a4015}
  .ta-x{background:#fff;color:var(--soft)}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(20,50,48,.5);display:none;align-items:center;justify-content:center;padding:16px;z-index:50;backdrop-filter:blur(3px)}
  .scrim.show{display:flex}
  .sheet{background:var(--bg2);border-radius:26px;width:100%;max-width:420px;padding:22px;box-shadow:0 30px 60px -20px rgba(0,0,0,.5);animation:pop .2s ease;max-height:88vh;overflow:auto}
  @keyframes pop{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
  .sheet h3{font-family:var(--display);font-weight:600;font-size:21px;margin:0 0 16px}
  .field{margin-bottom:15px}
  .field label{display:block;font-weight:800;font-size:12px;color:var(--soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select{width:100%;border:2px solid var(--line);background:#fff;border-radius:13px;padding:12px 14px;font-family:var(--body);font-weight:700;font-size:16px;color:var(--ink);outline:none}
  .field input:focus,.field select:focus{border-color:var(--accent)}
  .minrow{display:flex;align-items:center;gap:10px}
  .stepper{width:44px;height:44px;border:none;border-radius:12px;background:#fff;box-shadow:var(--shadow);font-size:22px;font-family:var(--display);cursor:pointer;color:var(--ink)}
  .emo-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;max-height:140px;overflow:auto}
  .emo-grid button{border:2px solid transparent;background:#fff;border-radius:12px;font-size:22px;padding:7px 0;cursor:pointer;box-shadow:0 4px 10px -6px rgba(0,0,0,.3)}
  .emo-grid button.pick{border-color:var(--accent);background:#eafaf8}
  /* chore icon trigger */
  .iconpick{display:flex;align-items:center;gap:12px;width:100%;background:#fff;border:2px solid #e3edeb;border-radius:14px;padding:9px 12px;cursor:pointer;box-shadow:0 4px 10px -7px rgba(0,0,0,.3)}
  .iconpick .ipprev{display:flex;gap:6px;font-size:26px;line-height:1;min-width:28px}
  .iconpick .ipprev .ipph{color:var(--accent);font-weight:800}
  .iconpick .ipgo{color:var(--soft);font-weight:800;font-size:14px;margin-left:auto}
  /* full-library emoji picker (layers above the sheet) */
  .epscrim{position:fixed;inset:0;background:rgba(20,50,48,.5);display:flex;align-items:flex-end;justify-content:center;z-index:60;backdrop-filter:blur(3px)}
  @media(min-width:480px){.epscrim{align-items:center;padding:16px}}
  .epcard{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:460px;padding:16px 16px 18px;box-shadow:0 -20px 60px -20px rgba(0,0,0,.5);animation:pop .2s ease;display:flex;flex-direction:column;max-height:84vh}
  @media(min-width:480px){.epcard{border-radius:22px}}
  .ephead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .ephead b{font-family:var(--display);font-weight:600;font-size:18px}
  .ephint{color:var(--soft);font-weight:800;font-size:12px}
  .ephint.warn{color:#E5524B}
  .epchips{display:flex;flex-wrap:wrap;gap:6px;min-height:36px;margin-bottom:8px;align-items:center}
  .epchip{display:inline-flex;align-items:center;gap:4px;font-size:21px;line-height:1;background:#fff;border:2px solid var(--accent);border-radius:12px;padding:4px 7px;cursor:pointer}
  .epchip span{font-size:13px;color:var(--soft);font-weight:900}
  .epempty{color:var(--soft);font-weight:700;font-size:13px}
  .epsearch{width:100%;border:2px solid #e3edeb;border-radius:12px;padding:10px 12px;font-size:15px;font-weight:600;background:#fff;margin-bottom:8px}
  .eptabs{display:flex;gap:2px;overflow-x:auto;padding-bottom:6px;border-bottom:1px solid #e3edeb}
  .eptab{flex:0 0 auto;border:none;background:transparent;font-size:21px;padding:5px 8px;border-radius:10px;cursor:pointer;opacity:.55}
  .eptab.on{background:#eafaf8;opacity:1}
  .epgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;overflow:auto;flex:1;min-height:170px;padding-top:8px}
  @media(max-width:380px){.epgrid{grid-template-columns:repeat(7,1fr)}}
  .epe{border:2px solid transparent;background:transparent;border-radius:10px;font-size:23px;padding:6px 0;cursor:pointer;line-height:1.15}

  .sa{display:flex;gap:10px;margin-top:6px}
  .sa button{flex:1;border:none;border-radius:14px;padding:13px;font-family:var(--display);font-weight:600;font-size:16px;cursor:pointer}
  .sa .cancel{background:#fff;color:var(--soft);box-shadow:var(--shadow)}
  .sa .save{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .choice .opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;font-family:var(--body)}
  .choice .opt b{font-family:var(--display);font-weight:600;font-size:16px;display:block}

  .toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:13px;padding:12px 14px;box-shadow:var(--shadow);font-weight:800;margin-bottom:10px}
  .sw{width:50px;height:28px;border-radius:20px;background:var(--line);position:relative;cursor:pointer;transition:background .2s}
  .sw.on{background:var(--accent)}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}

  .burst{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .burst span{position:absolute;animation:fall 1.5s ease-in forwards}
  @keyframes fall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
  .hint{text-align:center;color:var(--soft);font-weight:700;font-size:12px;margin-top:24px;opacity:.85}

  /* done-today chore */
  .chore.done{opacity:.62;background:linear-gradient(180deg,#eef7f3,#fff);cursor:default}
  .chore.done .check{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:#5BB98C;color:#fff;display:grid;place-items:center;font-weight:900;font-size:15px;box-shadow:var(--shadow)}

  /* critter reveal */
  .reveal{position:fixed;inset:0;background:rgba(20,50,48,.62);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:65;padding:20px}
  .reveal.show{display:flex;animation:revfade .25s ease}
  @keyframes revfade{from{opacity:0}to{opacity:1}}
  .reveal-card{text-align:center;color:#fff}
  .reveal-card .rl-sub{font-family:var(--display);font-weight:600;font-size:24px;margin-bottom:6px;text-shadow:0 2px 10px rgba(0,0,0,.4)}
  .reveal-card .rl-art{width:190px;height:190px;margin:0 auto;animation:revpop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes revpop{0%{transform:scale(.2) rotate(-20deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0)}}
  .reveal-card .rl-name{font-weight:800;font-size:17px;margin-top:6px;text-shadow:0 2px 8px rgba(0,0,0,.4)}
  .reveal-card .rl-tap{font-weight:700;font-size:12px;opacity:.8;margin-top:14px}

  /* activity log */
  .actlog{display:flex;flex-direction:column;gap:7px}
  .actrow{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:13px;padding:9px 13px;box-shadow:0 6px 14px -10px rgba(30,80,75,.3);font-size:14px;font-weight:700;color:var(--ink)}
  .actrow .grow{flex:1}
  .actrow .ago{color:var(--soft);font-size:12px;white-space:nowrap}
  .dayhdr{font-weight:800;font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin:10px 2px 2px;padding-top:8px;border-top:1px solid rgba(20,60,55,.1)}
  .dayhdr:first-child{border-top:none;padding-top:0;margin-top:0}

  /* setup wizard */
  .setup-hero{text-align:center;padding:18px 6px 6px}
  .setup-hero h1{font-family:var(--display);font-weight:700;font-size:32px;line-height:1.12;margin:6px 0 10px;letter-spacing:-.5px}
  .setup-hero p{font-weight:700;color:var(--soft);font-size:15px;max-width:330px;margin:0 auto 8px;line-height:1.5}
  .setup-art{display:flex;justify-content:center;gap:2px;height:84px}
  .setup-art .sa-c{width:84px;height:84px;animation:bob 5s ease-in-out infinite}
  .setup-card{background:linear-gradient(180deg,var(--bg2),#fff);border-radius:28px;padding:20px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7);margin-top:14px}
  .btn-big{width:100%;border:none;border-radius:18px;background:var(--accent);color:#fff;font-family:var(--display);font-weight:600;font-size:20px;padding:16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s}
  .btn-big:active{transform:scale(.97)}
  .btn-big:disabled{opacity:.45;cursor:default}

  /* pom source picker */
  .srcbtn{border:2px solid var(--line);background:#fff;border-radius:14px;padding:11px 8px;font-family:var(--body);font-weight:800;font-size:14px;color:var(--ink);cursor:pointer;line-height:1.3;text-align:center}
  .srcbtn span{font-size:11px;font-weight:700;color:var(--soft)}
  .srcbtn.on{border-color:var(--accent);background:#eafaf8}

  /* auth gate (cloud mode) */
  .authgate{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:18px;
    background:radial-gradient(120% 80% at 50% -10%, #D7EFE8 0%, transparent 55%),var(--bg)}
  .authgate.show{display:flex}
  .auth-card{background:linear-gradient(180deg,var(--bg2),#fff);border-radius:28px;padding:24px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center}
  .auth-card h2{font-family:var(--display);font-weight:700;font-size:26px;margin:6px 0 4px}
  .auth-card p{font-weight:700;color:var(--soft);font-size:14px;margin:0 0 16px}
  .auth-tabs{display:flex;gap:8px;margin-bottom:14px}
  .auth-tabs button{flex:1;border:none;border-radius:12px;padding:10px;font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;background:#fff;color:var(--soft);box-shadow:inset 0 0 0 2px var(--line)}
  .auth-tabs button.on{background:var(--accent);color:#fff;box-shadow:none}
  .gbtn{width:100%;border:2px solid var(--line);background:#fff;border-radius:14px;padding:12px;font-family:var(--body);font-weight:800;font-size:15px;cursor:pointer;color:var(--ink);margin-top:6px}
</style>

<body>
<div class="wrap" id="app"></div>

<div class="overlay" id="overlay"><div class="timer-card" id="timerCard"></div></div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="reveal" id="reveal"></div>
<div class="burst" id="burst"></div>
<div class="authgate" id="authgate"></div>

<!-- PWA install: capture the browser's install prompt as early as possible so the
     app can offer an obvious "Add to Home Screen" button on demand. -->
<script>
  window.__ppInstall = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault(); window.__ppInstall = e;
    try { window.dispatchEvent(new Event('pp-installable')); } catch(_){}
  });
  window.addEventListener('appinstalled', function(){
    window.__ppInstall = null;
    try { window.dispatchEvent(new Event('pp-installed')); } catch(_){}
  });
</script>

<!-- CORE: local-first app (CritterEngine + economy + store + UI). Inlined at build time
     so the jsdom harness runs it with zero network. See build.mjs / src/*.js -->
<script>
(function(){
  "use strict";

/* ===== src/store.js ===== */
/* ============================================================
   STORE SEAM вҖ” the single swap point between local-first and cloud.

   Local mode (default, and the ONLY mode the jsdom harness exercises):
   whole-family blob in localStorage under `pomPondV1`, exactly like
   the prototype. Cloud mode is layered on at runtime by js/cloud.js
   (Firebase), which sets `Backend.cloud` вҖ” economy mutations then
   route to Cloud Functions and live state arrives via onSnapshot.
   The local code path below is unchanged so behavior + the harness
   stay identical.
   ============================================================ */
  const LS_KEY = "pomPondV1";
  const store = {
    get(k,f){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch(e){ return f; } },
    set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };

  // Backend.cloud is null until js/cloud.js (deploy-only module) activates it.
  // When active, the app routes all economy-affecting actions to the server
  // (kids can't self-credit) and receives state via snapshots.
  const Backend = {
    cloud: null,
    cloudActive(){ return !!(this.cloud && this.cloud.active); },
    loadLocal(){ return store.get(LS_KEY, null) || store.get("choreCrewV2", null); },
    saveLocal(fam){ store.set(LS_KEY, fam); }
  };


/* ===== src/critter-engine.js ===== */
/* ============================================================
   CRITTER ENGINE  вҖ” canonical, self-contained, DETERMINISTIC.
   render(seed, archetype, rarity) -> SVG string (viewBox 0 0 100 100).
   Same seed -> same critter, forever. Add a species = add ONE
   function to ARCH (append only вҖ” never alter an existing one or
   every kid's existing pond changes).

   Dual-mode: usable inline in the browser build AND require()-able
   from Cloud Functions (Node) so the server can mint critters with
   identical output. Do NOT call Math.random / Date inside the render
   path вҖ” every random value must come from the seeded rng. The ONLY
   permitted Math.random is in randomArchetype() (mint-time only).
   ============================================================ */
(function (root, factory) {
  const mod = factory();
  if (typeof module !== 'undefined' && module.exports) module.exports = mod;
  root.CritterEngine = mod;
})(typeof self !== 'undefined' ? self : (typeof globalThis !== 'undefined' ? globalThis : this), function () {
  function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function rng(seed){let s=hash(seed);return()=>{s=Math.imul(s^(s>>>15),2246822507);s=Math.imul(s^(s>>>13),3266489909);return((s^(s>>>16))>>>0)/4294967296;};}
  const pick=(r,a)=>a[Math.floor(r()*a.length)];
  const f1=n=>(Math.round(n*10)/10);

  // Species-appropriate palettes: [hueLo,hueHi,satLo,satHi]. Hues still vary
  // WITHIN the range so drops feel unique, but a fox reads orange, a frog green,
  // etc. Species not listed keep a fully-random hue (good for the fantastical /
  // abstract ones: slime, dragon, butterfly, koi, octopusвҖҰ).
  const PAL={
    frog:[95,150,52,68], turtle:[100,150,46,64], newt:[95,140,50,66], tadpole:[100,150,45,62], lizard:[95,145,50,66],
    fox:[18,34,72,86], bear:[24,36,40,55], owl:[26,42,40,56], hedgehog:[26,40,34,50],
    hamster:[28,42,40,56], mouse:[28,44,24,42], otter:[22,36,46,62], beaver:[20,34,46,62], fawn:[28,40,52,66],
    penguin:[210,228,16,30], heron:[200,222,14,30],
    duck:[44,54,76,90], chick:[44,54,82,94], mushroom:[352,372,64,80], starfish:[340,372,66,82],
    seahorse:[18,46,66,82], bunny:[300,340,30,46], cat:[18,40,40,58], snail:[30,300,40,62]
  };
  function traits(seed,rarity,arch){
    const r=rng(seed);
    const uid=(hash(seed)%100000).toString(36); // unique per-render id fragment for gradient defs
    const p=PAL[arch];
    const hue=p ? Math.floor(((p[0]+r()*(p[1]-p[0]))%360+360)%360) : Math.floor(r()*360);
    const harm=pick(r,[26,150,180,205,330,42]);
    const hue2=(hue+harm)%360;
    const sat=p ? p[2]+Math.floor(r()*(p[3]-p[2])) : 58+Math.floor(r()*12);
    const t={
      uid, hue, hue2, harm,
      body:`hsl(${hue},${sat}%,62%)`,
      bodyD:`hsl(${hue},${sat-8}%,47%)`,
      bodyL:`hsl(${hue},${sat+10}%,74%)`,
      belly:`hsl(${hue},${Math.min(sat+18,92)}%,88%)`,
      acc:`hsl(${hue2},72%,56%)`,
      accD:`hsl(${hue2},66%,44%)`,
      line:`hsl(${hue},45%,28%)`,
      pattern:pick(r,['plain','plain','spots','stripes','patches','freckles','ombre']),
      eyeStyle:pick(r,['round','round','big','sleepy','wink','sparkle','happy']),
      blush:r()<0.55,
      r
    };
    if(rarity>=3)t.accessory='crown';
    else if(rarity>=2)t.accessory=pick(r,['bow','flower','hat','star','headphones']);
    else if(rarity>=1)t.accessory=(r()<0.32)?pick(r,['bow','flower','hat','leaf','scarf']):'none';
    else t.accessory=(r()<0.10)?pick(r,['bow','flower','leaf']):'none';
    return t;
  }

  // soft body gradient def (cheap radial); returns {def, fill}
  function bodyGrad(t,suffix){
    const id='g'+t.uid+(suffix||'');
    const def=`<radialGradient id="${id}" cx="38%" cy="30%" r="80%"><stop offset="0%" stop-color="${t.bodyL}"/><stop offset="60%" stop-color="${t.body}"/><stop offset="100%" stop-color="${t.bodyD}"/></radialGradient>`;
    return {def, fill:`url(#${id})`};
  }

  function eyes(t,x1,x2,y,sz){
    sz=sz||1; const s=t.eyeStyle;
    const dot=x=>`<circle cx="${x}" cy="${y}" r="${f1(2.7*sz)}" fill="#2c2622"/><circle cx="${f1(x-0.9*sz)}" cy="${f1(y-0.9*sz)}" r="${f1(0.9*sz)}" fill="#fff"/>`;
    const curve=x=>`<path d="M${f1(x-4*sz)} ${y} q${f1(4*sz)} ${f1(4*sz)} ${f1(8*sz)} 0" stroke="#2c2622" stroke-width="${f1(1.9*sz)}" fill="none" stroke-linecap="round"/>`;
    const happy=x=>`<path d="M${f1(x-4*sz)} ${f1(y+1.5*sz)} q${f1(4*sz)} ${f1(-5*sz)} ${f1(8*sz)} 0" stroke="#2c2622" stroke-width="${f1(1.9*sz)}" fill="none" stroke-linecap="round"/>`;
    if(s==='sleepy')return curve(x1)+curve(x2);
    if(s==='happy')return happy(x1)+happy(x2);
    if(s==='wink')return dot(x1)+curve(x2);
    if(s==='big'){const e=x=>`<circle cx="${x}" cy="${y}" r="${f1(4.6*sz)}" fill="#fff"/><circle cx="${x}" cy="${f1(y+0.6*sz)}" r="${f1(3*sz)}" fill="#2c2622"/><circle cx="${f1(x+1.5*sz)}" cy="${f1(y-1.5*sz)}" r="${f1(1.3*sz)}" fill="#fff"/><circle cx="${f1(x-1.3*sz)}" cy="${f1(y+1.6*sz)}" r="${f1(0.7*sz)}" fill="#fff" opacity=".8"/>`;return e(x1)+e(x2);}
    if(s==='sparkle'){const e=x=>`<circle cx="${x}" cy="${y}" r="${f1(3.6*sz)}" fill="#2c2622"/><circle cx="${f1(x-1.2*sz)}" cy="${f1(y-1.2*sz)}" r="${f1(1.2*sz)}" fill="#fff"/><circle cx="${f1(x+1.4*sz)}" cy="${f1(y+1.2*sz)}" r="${f1(0.7*sz)}" fill="#fff"/>`;return e(x1)+e(x2);}
    return dot(x1)+dot(x2);
  }
  function blush(t,x1,x2,y){return t.blush?`<ellipse cx="${x1}" cy="${y}" rx="3.2" ry="2.2" fill="hsl(${t.hue},88%,72%)" opacity=".6"/><ellipse cx="${x2}" cy="${y}" rx="3.2" ry="2.2" fill="hsl(${t.hue},88%,72%)" opacity=".6"/>`:'';}
  function smile(x,y,w){return `<path d="M${f1(x-w)} ${y} q${w} ${f1(w*0.9)} ${f1(2*w)} 0" stroke="#2c2622" stroke-width="1.6" fill="none" stroke-linecap="round"/>`;}

  function mark(t,cx,cy,sc){sc=sc||1; const a=t.acc;
    if(t.pattern==='spots')return `<circle cx="${f1(cx-7*sc)}" cy="${cy}" r="${f1(2.4*sc)}" fill="${a}" opacity=".82"/><circle cx="${f1(cx+6*sc)}" cy="${f1(cy+4*sc)}" r="${f1(2*sc)}" fill="${a}" opacity=".82"/><circle cx="${f1(cx+2*sc)}" cy="${f1(cy-5*sc)}" r="${f1(1.7*sc)}" fill="${a}" opacity=".82"/>`;
    if(t.pattern==='stripes')return `<path d="M${f1(cx-10*sc)} ${cy} h${f1(20*sc)}" stroke="${a}" stroke-width="${f1(2*sc)}" opacity=".55" stroke-linecap="round"/><path d="M${f1(cx-8*sc)} ${f1(cy+6*sc)} h${f1(16*sc)}" stroke="${a}" stroke-width="${f1(2*sc)}" opacity=".55" stroke-linecap="round"/>`;
    if(t.pattern==='patches')return `<ellipse cx="${f1(cx+5*sc)}" cy="${f1(cy-2*sc)}" rx="${f1(6*sc)}" ry="${f1(5*sc)}" fill="${a}" opacity=".42"/>`;
    if(t.pattern==='freckles')return `<circle cx="${f1(cx-6*sc)}" cy="${cy}" r="${f1(0.9*sc)}" fill="${t.accD}" opacity=".7"/><circle cx="${f1(cx-3*sc)}" cy="${f1(cy+1*sc)}" r="${f1(0.9*sc)}" fill="${t.accD}" opacity=".7"/><circle cx="${f1(cx+4*sc)}" cy="${cy}" r="${f1(0.9*sc)}" fill="${t.accD}" opacity=".7"/><circle cx="${f1(cx+7*sc)}" cy="${f1(cy+1*sc)}" r="${f1(0.9*sc)}" fill="${t.accD}" opacity=".7"/>`;
    if(t.pattern==='ombre')return `<ellipse cx="${cx}" cy="${f1(cy+5*sc)}" rx="${f1(13*sc)}" ry="${f1(7*sc)}" fill="${a}" opacity=".28"/>`;
    return '';
  }

  function accessory(t,x,y){const a=t.accessory;
    if(a==='crown')return `<g><path d="M${x-11} ${y} l4 -10 4 6 4 -10 4 10 4 -6 4 10z" fill="#FFD43B" stroke="#E6A700" stroke-width="1"/><circle cx="${x-7}" cy="${y-9}" r="1.4" fill="#fff"/><circle cx="${x+1}" cy="${y-10}" r="1.4" fill="#FF6B9D"/><circle cx="${x+9}" cy="${y-9}" r="1.4" fill="#6BCBFF"/></g>`;
    if(a==='bow')return `<g transform="translate(${x},${y})"><path d="M0 0 l-9 -5 0 10z" fill="${t.acc}"/><path d="M0 0 l9 -5 0 10z" fill="${t.acc}"/><path d="M-9 -5 l3 5 -3 5z" fill="${t.accD}"/><path d="M9 -5 l-3 5 3 5z" fill="${t.accD}"/><circle r="3" fill="${t.acc}" stroke="#fff" stroke-width="1"/></g>`;
    if(a==='hat')return `<g transform="translate(${x},${y})"><path d="M-11 3 h22 l-6 -15 -10 0z" fill="${t.acc}"/><path d="M-11 3 h22" stroke="${t.accD}" stroke-width="2"/><circle cx="6" cy="-12" r="2.6" fill="#fff"/></g>`;
    if(a==='leaf')return `<g transform="translate(${x},${y})"><path d="M0 2 q-10 -10 0 -16 q10 6 0 16z" fill="hsl(120,52%,46%)"/><path d="M0 2 v-15" stroke="hsl(120,45%,34%)" stroke-width="1"/></g>`;
    if(a==='scarf')return `<g transform="translate(${x},${y})"><path d="M-14 0 q14 8 28 0 l0 5 q-14 7 -28 0z" fill="${t.acc}"/><path d="M10 4 l3 12 4 -2 -2 -11z" fill="${t.accD}"/></g>`;
    if(a==='star')return `<g transform="translate(${x},${y})">${star(0,0,4.5,'#FFD43B')}</g>`;
    if(a==='headphones')return `<g transform="translate(${x},${y})"><path d="M-16 6 a16 16 0 0 1 32 0" fill="none" stroke="#444" stroke-width="2.5"/><rect x="-19" y="4" width="6" height="9" rx="2" fill="${t.acc}"/><rect x="13" y="4" width="6" height="9" rx="2" fill="${t.acc}"/></g>`;
    if(a==='flower')return `<g transform="translate(${x},${y-3})">${[0,72,144,216,288].map(d=>`<circle cx="${f1(6*Math.cos(d*Math.PI/180))}" cy="${f1(6*Math.sin(d*Math.PI/180))}" r="3.3" fill="hsl(${(t.hue+180)%360},80%,76%)"/>`).join('')}<circle r="2.8" fill="#FFC24B"/></g>`;
    return '';
  }

  function star(cx,cy,rad,fill){let p='';for(let i=0;i<10;i++){const ang=Math.PI/2+i*Math.PI/5;const rr=i%2?rad*0.45:rad;p+=(i?'L':'M')+f1(cx+rr*Math.cos(ang))+' '+f1(cy-rr*Math.sin(ang))+' ';}return `<path d="${p}Z" fill="${fill}"/>`;}

  // shared soft contact shadow
  function shadow(cx,cy,rx){return `<ellipse cx="${cx}" cy="${cy||90}" rx="${rx||26}" ry="5" fill="#000" opacity=".10"/>`;}

  const ARCH={

    lizard(t){const g=bodyGrad(t);return [`<defs>${g.def}</defs>${shadow(50,86,24)}<path d="M70 60 q18 -4 22 4 q-8 8 -18 2z" fill="${t.bodyD}"/><ellipse cx="48" cy="62" rx="24" ry="12" fill="${g.fill}"/><path d="M24 62 q-7 5 -11 3 M30 70 q-3 7 -8 7 M66 70 q3 7 8 7" stroke="${g.fill}" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M28 54 q18 -7 38 0" stroke="${t.acc}" stroke-width="2.5" fill="none" opacity=".5"/>${mark(t,46,62,0.8)}<circle cx="26" cy="55" r="6" fill="${g.fill}"/><circle cx="24" cy="54" r="2.6" fill="#2c2622"/><circle cx="35" cy="54" r="2.6" fill="#2c2622"/><circle cx="23" cy="53" r="0.9" fill="#fff"/>${blush(t,24,38,60)}`,46,38];},
    jellyfish(t){const g=bodyGrad(t);return [`<defs>${g.def}</defs>${shadow(50,90,18)}<path d="M28 50 q0 -24 22 -24 q22 0 22 24 q-11 5 -22 0 q-11 5 -22 0z" fill="${g.fill}" opacity=".92"/><ellipse cx="42" cy="38" rx="4" ry="6" fill="#fff" opacity=".4"/>${[34,42,50,58,66].map((x,i)=>`<path d="M${x} 52 q${i%2?4:-4} 14 0 24" stroke="${t.acc}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".8"/>`).join('')}${eyes(t,44,56,42,0.8)}${smile(50,47,3.5)}${blush(t,38,62,46)}`,50,24];},
    swan(t){return [`${shadow(50,90,22)}<ellipse cx="46" cy="64" rx="24" ry="14" fill="#fff"/><ellipse cx="46" cy="64" rx="24" ry="14" fill="hsl(${t.hue},30%,70%)" opacity=".18"/><path d="M64 60 q14 -2 14 -22 q0 -10 -6 -10 q-5 0 -5 8 q0 14 -8 18z" fill="#fff" stroke="hsl(${t.hue},20%,82%)" stroke-width="0.6"/><path d="M66 30 l-9 2 8 4z" fill="hsl(20,85%,58%)"/><circle cx="68" cy="32" r="2.6" fill="#2c2622"/><path d="M28 60 q-8 6 -14 4" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>${blush(t,60,72,36)}`,50,16];}
  };

  const NAMES={
    koi:'Koi', axolotl:'Axolotl', hummingbird:'Hummingbird', dragonfly:'Dragonfly',
    octopus:'Octopus', seahorse:'Seahorse', starfish:'Starfish', jellyfish:'Jellyfish'
  };

  const KEYS=Object.keys(ARCH);
  // FROZEN denominator for the render fallback (an invalid/missing stored archetype).
  // Adding species grows KEYS, which would otherwise re-map every legacy seed that
  // hits the fallback вҶ’ silently re-skinning old critters. Pinning to the original
  // species count keeps that path stable forever. (New mints use archetypeFor with
  // the full list and STORE the result, so they never depend on this.)
  const FALLBACK_N=40;

  function sparkles(t,n){let r=t.r,out='';for(let i=0;i<n;i++){const a=r()*Math.PI*2,rad=38+r()*8,x=f1(50+rad*Math.cos(a)),y=f1(54+rad*Math.sin(a)),sz=f1(2+r()*2);out+=star(x,y,sz,'hsl(50,100%,75%)');}return out;}

  function render(seed,archetype,rarity){
    rarity=(rarity>=3)?3:(rarity>=2)?2:(rarity>=1)?1:0;   // normalize to 0вҖ“3 so aura visuals & rarityName always agree (identity for valid inputs)
    if(!ARCH[archetype])archetype=KEYS[hash(seed)%Math.min(KEYS.length,FALLBACK_N)];
    const t=traits(seed,rarity,archetype);
    const out=ARCH[archetype](t), inner=out[0], ax=out[1], ay=out[2];
    const c=t.uid;
    let aura='', spark='';
    if(rarity===1){
      // soft radial halo (transparent core) вҖ” adds a gentle glow without the
      // "critter sitting on a coloured coin" look.
      const gid='ar'+c;
      aura=`<defs><radialGradient id="${gid}"><stop offset="58%" stop-color="hsl(${t.hue2},85%,66%,0)"/><stop offset="100%" stop-color="hsl(${t.hue2},85%,64%,.28)"/></radialGradient></defs><circle cx="50" cy="56" r="48" fill="url(#${gid})"/>`;
      spark=sparkles(t,2);
    }else if(rarity===2){
      const gid='ar'+c;
      aura=`<defs><radialGradient id="${gid}"><stop offset="55%" stop-color="hsl(${t.hue2},85%,62%,0)"/><stop offset="100%" stop-color="hsl(${t.hue2},90%,60%,.4)"/></radialGradient></defs><circle cx="50" cy="56" r="48" fill="url(#${gid})"/><circle cx="50" cy="56" r="46" fill="none" stroke="hsl(${t.hue2},88%,60%,.6)" stroke-width="2" stroke-dasharray="3 5"/>`;
      spark=sparkles(t,4);
    }else if(rarity>=3){
      const gid='ar'+c;
      aura=`<defs><radialGradient id="${gid}"><stop offset="50%" stop-color="hsl(46,95%,62%,0)"/><stop offset="100%" stop-color="hsl(46,95%,58%,.5)"/></radialGradient></defs><circle cx="50" cy="56" r="49" fill="url(#${gid})"/><circle cx="50" cy="56" r="47" fill="none" stroke="hsl(45,95%,55%,.8)" stroke-width="2.5"/><circle cx="50" cy="56" r="43" fill="none" stroke="hsl(48,100%,70%,.5)" stroke-width="1"/>`;
      spark=sparkles(t,6);
    }
    // Soft white "sticker" outline around the whole critter (silhouette pops on
    // any background). Standard SVG filter вҖ” supported by every modern browser.
    const oid='o'+c;
    const outline=`<filter id="${oid}" x="-18%" y="-18%" width="136%" height="136%"><feMorphology in="SourceAlpha" operator="dilate" radius="2.2" result="d"/><feFlood flood-color="#ffffff" result="w"/><feComposite in="w" in2="d" operator="in" result="o"/><feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
    return `<svg viewBox="0 0 100 100" width="100%" height="100%"><defs>${outline}</defs>${aura}<g filter="url(#${oid})">${inner}${accessory(t,ax,ay)}</g>${spark}</svg>`;
  }

  return {render,list:KEYS,randomArchetype:()=>KEYS[Math.floor(Math.random()*KEYS.length)],
    name:k=>NAMES[k]||(k.charAt(0).toUpperCase()+k.slice(1)),
    rarityName:n=>['Common','Uncommon','Rare','Legendary'][n]||'Common',
    // --- deterministic helpers for combining critters ---
    archetypeFor:(seed)=>KEYS[hash(String(seed))%KEYS.length],   // a species from a seed
    combineSeed:(seeds)=>'cmb:'+hash((seeds||[]).slice().sort().join('|')).toString(36)}; // stable child seed
});


/* ===== src/economy.js ===== */
/* ============================================================
   ECONOMY (hybrid bucket ladder) вҖ” PURE, no DOM, no persistence.

   Ported VERBATIM from the prototype's earn -> checkSmall ->
   checkMedium -> checkBig -> resolveChoice chain. The ONLY change
   from the prototype is mechanical: functions take an explicit
   `fam` and push newly-minted critters into a caller-supplied
   `reveals` array instead of mutating module globals. The math,
   ordering, and side-effects are identical вҖ” the jsdom harness is
   the contract.

   Dual-mode: inlined into the browser build AND require()-d by the
   Cloud Functions, so the server runs the SAME ladder transactionally
   (kids can never compute their own economy result вҖ” В§5).
   ============================================================ */
(function (root, factory) {
  const CritterEngine = root.CritterEngine ||
    (typeof require !== 'undefined' ? require('./critter-engine.js') : null);
  const mod = factory(CritterEngine);
  if (typeof module !== 'undefined' && module.exports) module.exports = mod;
  root.Economy = mod;
})(typeof self !== 'undefined' ? self : (typeof globalThis !== 'undefined' ? globalThis : this), function (CritterEngine) {

  function id(){return Math.random().toString(36).slice(2,9);}
  function today(now){return new Date(now||Date.now()).toISOString().slice(0,10);}
  const doneKey=(kid,chore,now)=>kid.id+"|"+chore.id+"|"+today(now);
  const isDoneToday=(fam,kid,chore,now)=>!!fam.done[doneKey(kid,chore,now)];

  function addCritter(fam,ownerId,rarity,special,tag,reveals,reason){
    const arch=CritterEngine.randomArchetype();
    const c={id:id(),ownerId,seed:ownerId+":"+Date.now()+":"+Math.random().toString(36).slice(2),
             archetype:arch,rarity,special:!!special,tag:tag||null,reason:reason||null,createdAt:Date.now()};
    fam.critters.push(c); if(reveals)reveals.push(c); return c;
  }
  function grant(fam,kid,tier){ fam.inventory.push({id:id(),ownerId:kid.id,tier,status:"ready",at:Date.now()}); }
  function logEvent(fam,kid,type,note,byUid){
    fam.log.unshift({id:id(),ownerId:kid.id,type,note:note||"",at:Date.now(),byUid:byUid||null});
    if(fam.log.length>60)fam.log.length=60;
  }
  function bumpStreak(fam,kid,now){
    const d=today(now); if(kid.lastActive===d)return;
    const y=new Date((now||Date.now())-864e5).toISOString().slice(0,10);
    kid.streak=(kid.lastActive===y)?(kid.streak||0)+1:1; kid.lastActive=d;
  }

  function earn(fam,kid,opts,reveals){          // opts:{type, special, note, byUid}
    opts=opts||{};
    kid.palms=(kid.palms||0)+1;
    bumpStreak(fam,kid);
    // why this critter exists, in plain words вҖ” so a kid can tap it and remember.
    // For freely-given Poms the note IS the specific reason label (e.g. "Shared
    // without being asked"); for chores it's the chore name.
    const reason=(opts.note&&(""+opts.note).trim())?(""+opts.note).trim()
      :(opts.type==="chore"?"Did a chore":"A kindness");
    addCritter(fam,kid.id,opts.special?1:0,opts.special,opts.special?opts.type:null,reveals,reason);
    kid.buckets.s++;
    logEvent(fam,kid,opts.type||"chore",opts.note,opts.byUid);
    checkSmall(fam,kid,reveals);
  }
  // Weighted earn: a reason/chore worth N Poms mints N (preserves "1 Pom = 1
  // critter"). Clamped 1..9 so a bad value can never runaway-mint.
  function earnTimes(fam,kid,opts,reveals,n){
    n=Math.max(1,Math.min(9,Math.floor(n)||1));
    for(let i=0;i<n;i++) earn(fam,kid,opts,reveals);
    return n;
  }
  function checkSmall(fam,kid,reveals){
    const cap=fam.settings.smallCap;
    if(kid.buckets.s>=cap){
      kid.buckets.s-=cap;
      grant(fam,kid,"small");
      addCritter(fam,kid.id,1,false,null,reveals,"Bonus for filling the Small pond рҹ’§");   // fused tier-1 critter
      kid.buckets.m++;
      checkMedium(fam,kid,reveals);
    }
  }
  function checkMedium(fam,kid,reveals){
    const cap=fam.settings.medCap;
    if(kid.buckets.m>=cap){
      kid.buckets.m-=cap;
      grant(fam,kid,"medium");
      addCritter(fam,kid.id,2,false,null,reveals,"Reward for filling the Medium pond рҹҢҠ");
      kid.choices=(kid.choices||0)+1;                // HYBRID: queue save-vs-keep
    }
  }
  function resolveChoice(fam,kid,saveUp,reveals){
    if(kid.choices>0)kid.choices--;
    if(saveUp){ kid.buckets.b++; checkBig(fam,kid,reveals); }
  }
  function checkBig(fam,kid,reveals){
    const cap=fam.settings.bigCap;
    if(kid.buckets.b>=cap){
      kid.buckets.b-=cap;
      grant(fam,kid,"big");
      addCritter(fam,kid.id,3,false,null,reveals,"Showpiece for filling the Big pond рҹӘ·");   // showpiece
    }
  }

  // Returns: {status:'already'|'pending'|'earned'}; mutates fam accordingly.
  function completeChore(fam,kid,chore,reveals,opts){
    opts=opts||{};
    if(isDoneToday(fam,kid,chore)) return {status:'already'};
    fam.done[doneKey(kid,chore)]=true;
    if(fam.settings.approval && !opts.forceEarn){
      fam.pending.push({id:id(),ownerId:kid.id,choreId:chore.id,at:Date.now()});
      return {status:'pending'};
    }
    earnTimes(fam,kid,{type:'chore',byUid:opts.byUid,note:chore.name},reveals,chore.palm||1);  // chore.palm = Pom value; note=chore name
    return {status:'earned'};
  }

  /* ---- combining (fusion) вҖ” DETERMINISTIC from the parent seeds ----
     Build the spec for a child critter fused from 2вҖ“3 parents. Pure: the server
     and the browser both call this so they agree on the result. Fusing UPGRADES
     rarity (min(3, best parent + (3-fuse ? 2 : 1))) and the archetype is derived
     from the child seed across ALL species, so combining can discover new ones. */
  function makeCombo(parents){
    const seed=CritterEngine.combineSeed(parents.map(p=>p.seed));
    const archetype=CritterEngine.archetypeFor(seed);
    const maxR=parents.reduce((m,p)=>Math.max(m,p.rarity||0),0);
    const rarity=Math.min(3, maxR + (parents.length>=3 ? 2 : 1));
    const names=parents.map(p=>CritterEngine.name(p.archetype)).join(' + ');
    return { seed, archetype, rarity, special:true, tag:'combo', reason:'Combined from '+names };
  }
  // Local-mode fusion: remove the parents from fam, append the child. Returns the
  // child (or {reject}). The server does the same via the Admin SDK (doc ops).
  function combine(fam,kid,parentIds,reveals,opts){
    opts=opts||{};
    const parents=parentIds.map(pid=>fam.critters.find(c=>c.id===pid&&c.ownerId===kid.id)).filter(Boolean);
    if(parents.length<2||parents.length>3) return {reject:'Pick 2 or 3 of your own critters.'};
    if(new Set(parentIds).size!==parents.length) return {reject:'Pick different critters.'};
    const spec=makeCombo(parents);
    const child=Object.assign({id:id(),ownerId:kid.id,createdAt:Date.now()},spec);
    const drop=new Set(parents.map(p=>p.id));
    fam.critters=fam.critters.filter(c=>!drop.has(c.id));
    fam.critters.push(child); if(reveals)reveals.push(child);
    logEvent(fam,kid,'combine',spec.reason,opts.byUid);
    return {child};
  }

  return {
    id, today, doneKey, isDoneToday,
    addCritter, grant, logEvent, bumpStreak,
    earn, earnTimes, checkSmall, checkMedium, checkBig, resolveChoice, completeChore,
    makeCombo, combine
  };
});


/* ===== src/emoji-data.js ===== */

  // normalize older / cloud-sourced state into the runtime shape
  function normalizeFam(f){
    f.settings=f.settings||{}; f.members=f.members||[]; f.chores=f.chores||[];
    f.rewards=f.rewards||[]; f.critters=f.critters||[]; f.inventory=f.inventory||[];
    f.log=f.log||[]; f.done=f.done||{}; f.pending=f.pending||[];
    if(f.setup===undefined) f.setup = f.members.some(m=>m.role==="child");
    f.members.forEach(m=>{ if(m.role==="child"){ m.buckets=m.buckets||{s:0,m:0,b:0}; m.choices=m.choices||0; m.streak=m.streak||0; if(m.lastActive===undefined)m.lastActive=null; } });
    return f;
  }

  let fam = normalizeFam( Backend.loadLocal() || defaultFamily() );
  function save(){
    if(cloudActive() && Backend.cloud.saveCrud){ try{ Backend.cloud.saveCrud(fam); }catch(e){} }
    Backend.saveLocal(fam);
  }

  let view=fam.setup?"lobby":"setup", meId=null;

  const member=mid=>fam.members.find(m=>m.id===mid);
  const me=()=>member(meId);
  const choresFor=kid=>fam.chores.filter(c=>!c.assignedTo||c.assignedTo===kid.id);

  const adultChores=()=>fam.chores.filter(c=>{const m=member(c.assignedTo);return !!(m&&m.role==="parent");});
  const choreDoneToday=c=>c.doneDate===today();

    if(choreDoneToday(c)){ c.doneDate=null; c.doneCount=Math.max(0,(c.doneCount||0)-1); }
    else { c.doneDate=today(); c.doneCount=(c.doneCount||0)+1; }

  const rewardsTier=t=>fam.rewards.filter(r=>r.tier===t);
  const crittersOf=mid=>fam.critters.filter(c=>c.ownerId===mid);
  const invOf=mid=>fam.inventory.filter(i=>i.ownerId===mid);
  function fmt(s){s=Math.max(0,Math.round(s));return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

  /* ---------- currency: Poms (renameable per family) ---------- */
  const cname=()=>fam.settings.currencyName||"Pom";
  const cnames=()=>{const n=cname();return /s$/i.test(n)?n:n+"s";};
  function pomIcon(sz){sz=sz||16;
    let dots="";for(let i=0;i<10;i++){const a=i/10*Math.PI*2;
      dots+=`<circle cx="${(50+30*Math.cos(a)).toFixed(1)}" cy="${(50+30*Math.sin(a)).toFixed(1)}" r="16" fill="hsl(${(i*36+10)%360},78%,66%)"/>`;}
    return `<svg viewBox="0 0 100 100" width="${sz}" height="${sz}" style="vertical-align:-${Math.round(sz*0.15)}px">${dots}<circle cx="50" cy="50" r="26" fill="hsl(45,90%,70%)"/><circle cx="43" cy="44" r="7" fill="hsl(45,95%,85%)"/></svg>`;}
  /* top-down pond icons for the three reward meters вҖ” grander as the tier goes up */
  function pondTierIcon(tier){
    const water=`<ellipse cx="50" cy="52" rx="45" ry="31" fill="#3E92B4"/>`+
      `<ellipse cx="50" cy="49" rx="40" ry="26" fill="#5FB7C6"/>`+
      `<ellipse cx="38" cy="38" rx="15" ry="6" fill="#cdf3ef" opacity=".6"/>`;
    const pad=(cx,cy,r)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#4FA86A"/><circle cx="${cx-r*0.32}" cy="${cy-r*0.32}" r="${r*0.5}" fill="#6cc188"/>`;
    const lotus=(cx,cy)=>{let p='';for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;p+=`<circle cx="${(cx+7*Math.cos(a)).toFixed(1)}" cy="${(cy+7*Math.sin(a)).toFixed(1)}" r="4" fill="#FF9EC4"/>`;}return p+`<circle cx="${cx}" cy="${cy}" r="4.4" fill="#FFD86B"/>`;};
    let extra='', rim='';
    if(tier==="m") extra=pad(64,55,15);
    if(tier==="b"){ extra=pad(28,62,11)+lotus(58,47)+`<circle cx="80" cy="42" r="2.4" fill="#fff"/><circle cx="22" cy="44" r="1.8" fill="#fff"/>`;

    return `<svg viewBox="0 0 100 100" width="46" height="40" style="display:block;margin:2px auto">${water}${extra}${rim}</svg>`;
  }

  /* ============================================================

  let revealQ=[];
  let pondZoom=1, pondPanX=0, pondPanY=0;   // pond view state вҖ” persists across re-renders

  // per-DEVICE view preference in localStorage вҖ” kids can't write economy state

  let critterPos=(()=>{ try{ return JSON.parse(localStorage.getItem("pp_critterpos")||"{}")||{}; }catch(e){ return {}; } })();
  function saveCritterPos(){ try{ localStorage.setItem("pp_critterpos",JSON.stringify(critterPos)); }catch(e){} }
  let combineMode=false, combineSel=[];   // рҹ§¬ fusion: select-and-combine state (kid view)
  const today=()=>Economy.today();

    if(cloudActive()){ Backend.cloud.completeChore(kid.id,chore.id).catch(e=>toast("Couldn't reach server вҖ” try again")); return; }

    if(cloudActive()){ Backend.cloud.resolveChoice(kid.id,saveUp).catch(()=>toast("Couldn't reach server")); return; }

  // рҹ§¬ fuse 2вҖ“3 of the kid's critters into one new one (server-authoritative in
  // cloud mode; same shared math locally). Consumed parents lose their saved spot.
  function doCombine(kid,ids){
    const cleanup=()=>{ ids.forEach(id=>{ delete critterPos[id]; }); saveCritterPos(); };
    if(cloudActive()){ Backend.cloud.combine(kid.id,ids).then(cleanup).catch(()=>toast("Couldn't reach server вҖ” try again")); return; }
    const r=Economy.combine(fam,kid,ids,revealQ,{byUid:"local"});
    if(r.reject){ toast(r.reject); return; }
    cleanup(); save(); playReveals(kid.id);
  }

  /* play earned-critter reveals (only on the earning kid's own screen) */
  function playReveals(kidId,done){
    const q=revealQ; revealQ=[];
    render();
    if(meId!==kidId||view!=="kid"||!q.length){ if(done)done(); return; }
    let i=0;
    const next=()=>{ if(i>=q.length){ render(); if(done)done(); return; } showReveal(q[i],()=>{ i++; next(); }); };
    setTimeout(next,160);

  // Drag a critter to a new spot (helps when they overlap вҖ” drag to untangle,
  // then tap the one you want). A real drag suppresses the tap-to-inspect; a
  // plain tap still inspects. Position is saved per-device (critterPos).
  function makeCritterDraggable(w,c,pond){
    w.onpointerdown=(e)=>{
      if(combineMode){ e.stopPropagation(); return; }   // in fuse mode, tap = select (no drag)
      e.stopPropagation();                 // don't let the pond start a pan
      const sx=e.clientX, sy=e.clientY, pr=pond.getBoundingClientRect();
      const startL=parseFloat(w.style.left)||0, startT=parseFloat(w.style.top)||0;
      let moved=false; w._dragged=false;
      try{ w.setPointerCapture(e.pointerId); }catch(_){}
      const move=(ev)=>{
        const dx=ev.clientX-sx, dy=ev.clientY-sy;
        if(!moved && Math.abs(dx)+Math.abs(dy)>5){ moved=true; w.classList.add("dragging"); }
        if(!moved) return;
        let nx=startL+(dx/pondZoom)/pr.width*100, ny=startT+(dy/pondZoom)/pr.height*100;
        nx=Math.max(2,Math.min(90,nx)); ny=Math.max(6,Math.min(86,ny));
        w.style.left=nx+"%"; w.style.top=ny+"%";
      };
      const up=()=>{
        window.removeEventListener("pointermove",move);
        window.removeEventListener("pointerup",up);
        window.removeEventListener("pointercancel",up);
        w.classList.remove("dragging");
        if(moved){ w._dragged=true; critterPos[c.id]={x:parseFloat(w.style.left),y:parseFloat(w.style.top)}; saveCritterPos(); }
      };
      window.addEventListener("pointermove",move);
      window.addEventListener("pointerup",up);
      window.addEventListener("pointercancel",up);
    };
    w.onclick=()=>{
      if(combineMode){ toggleCombineSel(c.id,w); return; }
      if(w._dragged){ w._dragged=false; return; } if(pond._ppDragged) return; inspectCritter(c);
    };
  }
  function toggleCombineSel(id,el){
    const i=combineSel.indexOf(id);
    if(i>=0){ combineSel.splice(i,1); el&&el.classList.remove("csel"); }
    else if(combineSel.length<3){ combineSel.push(id); el&&el.classList.add("csel"); }
    else { toast("Up to 3 вҖ” tap one to deselect"); return; }
    updateCombineBar();
  }
  function updateCombineBar(){
    const msg=document.getElementById("combinemsg"), go=document.getElementById("combineGo");
    const n=combineSel.length;
    if(msg) msg.textContent = n===0?"Tap 2вҖ“3 critters to fuse вңЁ" : n===1?"Pick at least 1 moreвҖҰ" : n+" selected вҖ” ready to fuse!";

  // Pinch / wheel / button zoom + drag-to-pan. Zoom state lives in module vars so
  // it survives the re-render paintPond does on every state change.
  function setupPondZoom(pond,stage){
    const MINZ=1, MAXZ=3.2;
    const dist=t=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    const clampPan=()=>{
      const r=pond.getBoundingClientRect();
      const mx=Math.max(0,(pondZoom-1)*r.width/2), my=Math.max(0,(pondZoom-1)*r.height/2);
      pondPanX=Math.max(-mx,Math.min(mx,pondPanX)); pondPanY=Math.max(-my,Math.min(my,pondPanY));
    };
    const apply=(animate)=>{
      stage.style.transition=animate?"transform .15s ease-out":"none";
      stage.style.transform=`translate(${pondPanX.toFixed(1)}px,${pondPanY.toFixed(1)}px) scale(${pondZoom.toFixed(3)})`;
      pond.classList.toggle("zoomed",pondZoom>1.001);
      const zo=pond.querySelector("#zout"),zi=pond.querySelector("#zin");
      if(zo)zo.disabled=pondZoom<=MINZ+0.001; if(zi)zi.disabled=pondZoom>=MAXZ-0.001;
    };
    const setZoom=(z,animate)=>{ pondZoom=Math.max(MINZ,Math.min(MAXZ,z)); if(pondZoom<=MINZ){pondPanX=pondPanY=0;} clampPan(); apply(animate); };
    const zi=pond.querySelector("#zin"),zo=pond.querySelector("#zout");
    if(zi)zi.onclick=e=>{e.stopPropagation();setZoom(pondZoom+0.6,true);};
    if(zo)zo.onclick=e=>{e.stopPropagation();setZoom(pondZoom-0.6,true);};
    pond.onwheel=e=>{ e.preventDefault(); setZoom(pondZoom+(e.deltaY<0?0.3:-0.3),false); };
    // drag-to-pan (only when zoomed in); guards a critter tap from firing after a drag
    let drag=false,pinching=false,sx=0,sy=0,ox=0,oy=0;
    pond.onpointerdown=e=>{ if(pinching||pondZoom<=MINZ||(e.target.closest&&e.target.closest(".zb")))return;
      drag=true;sx=e.clientX;sy=e.clientY;ox=pondPanX;oy=pondPanY;pond._ppDragged=false;
      try{pond.setPointerCapture(e.pointerId);}catch(_){}};
    pond.onpointermove=e=>{ if(!drag||pinching)return; const dx=e.clientX-sx,dy=e.clientY-sy;
      if(Math.abs(dx)+Math.abs(dy)>6)pond._ppDragged=true; pondPanX=ox+dx;pondPanY=oy+dy; clampPan(); apply(false); };
    const end=()=>{ if(!drag)return; drag=false; if(pond._ppDragged)setTimeout(()=>{pond._ppDragged=false;},60); };
    pond.onpointerup=end; pond.onpointercancel=end;
    // pinch-to-zoom (touch). Native pinch is disabled (user-scalable=no), so this owns it.
    let pd=0,pz=1;
    pond.ontouchstart=e=>{ if(e.touches.length===2){pinching=true;drag=false;pd=dist(e.touches);pz=pondZoom;} };
    pond.ontouchmove=e=>{ if(e.touches.length===2&&pd){ e.preventDefault(); setZoom(pz*(dist(e.touches)/pd),false); } };
    pond.ontouchend=e=>{ if(e.touches.length<2){pinching=false;pd=0;} };
    apply(false);
  }

  function paintTimer(){
    const tt=timerCard.querySelector("#tt"),rf=timerCard.querySelector("#rf"),ff=timerCard.querySelector("#ff"),tg=timerCard.querySelector("#tg");

  function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"now";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d";}
  // History is grouped by day with a date header; each row shows the clock time.
  function dayKey(ts){const d=new Date(ts);return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();}
  function ord(n){const v=n%100,s=["th","st","nd","rd"];return n+(s[(v-20)%10]||s[v]||s[0]);}
  function dayLabel(ts){const d=new Date(ts),now=new Date();
    if(dayKey(ts)===dayKey(now.getTime()))return"Today";
    if(dayKey(ts)===dayKey(now.getTime()-864e5))return"Yesterday";
    const base=d.toLocaleDateString(undefined,{month:"long"})+" "+ord(d.getDate());
    return d.getFullYear()!==now.getFullYear()?base+", "+d.getFullYear():base;}
  function clockTime(ts){return new Date(ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});}

  /* ============================================================
     EMOJI PICKER вҖ” full library, standard category tabs + search,
     multi-select (up to `max`). Layers ABOVE the open sheet so the
     form underneath keeps its state; calls onDone(arrayOfEmoji).
     ============================================================ */
  function openEmojiPicker(initial,max,onDone,title){
    max=max||3;
    const DATA=(typeof EMOJI_DATA!=="undefined"&&EMOJI_DATA)||{order:[],groups:{}};
    let selected=(initial||[]).filter(Boolean).slice(0,max);
    const groupOf=(em)=>DATA.order.find(g=>DATA.groups[g].items.some(it=>it[0]===em));
    let active=(selected[0]&&groupOf(selected[0]))||(DATA.groups.objects?"objects":DATA.order[0])||"";
    let query="";

    const wrap=document.createElement("div"); wrap.className="epscrim";
    wrap.innerHTML=`<div class="epcard">
      <div class="ephead"><b>${esc(title||"Chore icons")}</b><span class="ephint" id="ephint"></span></div>
      <div class="epchips" id="epchips"></div>
      <input class="epsearch" id="epsearch" placeholder="Search emojisвҖҰ  (broom, dog, plantвҖҰ)" autocomplete="off">
      <div class="eptabs" id="eptabs"></div>
      <div class="epgrid" id="epgrid"></div>
      <div class="sa"><button class="cancel" id="epcancel">Cancel</button><button class="save" id="epdone">Done</button></div>
    </div>`;
    document.body.appendChild(wrap);
    const $=(s)=>wrap.querySelector(s);
    const tabs=$("#eptabs"),grid=$("#epgrid"),chips=$("#epchips"),hint=$("#ephint"),done=$("#epdone"),search=$("#epsearch");

    tabs.innerHTML=DATA.order.map(g=>`<button class="eptab" data-g="${g}" title="${esc(DATA.groups[g].label)}">${DATA.groups[g].icon}</button>`).join("");

    const renderChips=()=>{
      chips.innerHTML=selected.length
        ? selected.map(e=>`<button class="epchip" data-rm="${e}">${e}<span>Г—</span></button>`).join("")
        : `<span class="epempty">No icons yet вҖ” tap some below</span>`;
      hint.textContent=`${selected.length}/${max} chosen`;
      done.disabled=selected.length===0;
    };
    const matches=()=>{
      if(query){ const out=[]; for(const g of DATA.order){ for(const it of DATA.groups[g].items){
        if(it[1].indexOf(query)>=0){ out.push(it); if(out.length>=250) return out; } } } return out; }
      return (DATA.groups[active]||{items:[]}).items;
    };
    const renderGrid=()=>{
      tabs.querySelectorAll(".eptab").forEach(t=>t.classList.toggle("on",!query&&t.dataset.g===active));
      const items=matches();
      grid.innerHTML=items.length
        ? items.map(it=>`<button class="epe${selected.includes(it[0])?" on":""}" data-e="${it[0]}" title="${esc(it[1])}">${it[0]}</button>`).join("")
        : `<div class="epnone">No emojis match вҖң${esc(query)}вҖқ.</div>`;
    };
    const refresh=()=>{ renderChips(); renderGrid(); };
    const toggle=(em)=>{
      const i=selected.indexOf(em);
      if(i>=0) selected.splice(i,1);
      else if(selected.length<max) selected.push(em);
      else { hint.textContent=`Up to ${max} вҖ” remove one first`; hint.classList.add("warn"); setTimeout(()=>hint.classList.remove("warn"),900); return; }
      refresh();
    };
    tabs.onclick=e=>{const b=e.target.closest(".eptab"); if(!b)return; active=b.dataset.g; query=""; search.value=""; renderGrid(); grid.scrollTop=0;};
    grid.onclick=e=>{const b=e.target.closest(".epe"); if(b)toggle(b.dataset.e);};
    chips.onclick=e=>{const b=e.target.closest(".epchip"); if(b)toggle(b.dataset.rm);};
    search.oninput=()=>{ query=search.value.trim().toLowerCase(); renderGrid(); grid.scrollTop=0; };
    const close=()=>wrap.remove();
    $("#epcancel").onclick=close;
    wrap.onclick=e=>{ if(e.target===wrap) close(); };
    done.onclick=()=>{ const out=selected.slice(); close(); onDone(out); };
    refresh();
  }

      <div class="field"><label>Color</label><div class="swatch-row" id="gc"></div></div>
      ${cloudActive()?`<div class="hint" style="text-align:left;margin:2px 0 8px">Want them on their <b>own phone</b> with their own login? Share the <b>grown-up invite code</b> in вҡҷпёҺ Settings вҖ” they sign up and join as a full co-parent. This just adds a tile that shares this device &amp; the Parent PIN.</div>`:`<div class="hint" style="text-align:left;margin:2px 0 8px">Adds a grown-up who shares this device and the Parent PIN.</div>`}
      <div class="sa">${canRemove?'<button class="cancel" id="gdel" style="background:#E5524B;color:#fff">Remove</button>':""}<button class="cancel">Cancel</button><button class="save">${isNew?"Add":"Save"}</button></div>`,s=>{
      const eg=s.querySelector("#ge");ADULT_EMOJI.forEach(em=>{const b=document.createElement("button");b.textContent=em;if(em===d.emoji)b.classList.add("pick");
        b.onclick=()=>{d.emoji=em;eg.querySelectorAll("button").forEach(x=>x.classList.remove("pick"));b.classList.add("pick");};eg.appendChild(b);});
      const cg=s.querySelector("#gc");COLORS.forEach(col=>{const sw=document.createElement("div");sw.className="swatch"+(col===d.color?" pick":"");sw.style.background=col;
        sw.onclick=()=>{d.color=col;cg.querySelectorAll(".swatch").forEach(x=>x.classList.remove("pick"));sw.classList.add("pick");};cg.appendChild(sw);});
      s.querySelectorAll(".cancel").forEach(b=>{if(b.id!=="gdel")b.onclick=closeSheet;});
      const del=s.querySelector("#gdel");if(del)del.onclick=()=>{fam.members=fam.members.filter(m=>m.id!==g.id);save();closeSheet();render();};
      s.querySelector(".save").onclick=()=>{d.name=s.querySelector("#gn").value.trim()||"Grown-up";
        if(isNew)fam.members.push(d);else Object.assign(g,d);save();closeSheet();render();};
      setTimeout(()=>{const el=s.querySelector("#gn");if(el)el.focus();},60);
    });
  }

  /* ---------- install / add to home screen ---------- */
  function isStandalone(){return (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;}
  function isiOS(){const ua=navigator.userAgent||"";return /iphone|ipad|ipod/i.test(ua)||(/Macintosh/i.test(ua)&&typeof document!=="undefined"&&'ontouchend' in document);}
  function isAndroid(){return /android/i.test(navigator.userAgent||"");}
  function showInstall(){return !isStandalone();}
  function doInstall(){
    const dp=window.__ppInstall;
    if(dp&&dp.prompt){ dp.prompt(); if(dp.userChoice)dp.userChoice.then(()=>{window.__ppInstall=null;render();}); return; }  // native one-tap (Android/desktop Chrome)
    installSheet();
  }
  function installSheet(){
    const ios=isiOS(), android=isAndroid();
    const steps = ios
      ? 'In <b>Safari</b>, tap the <b>Share</b> icon <span style="font-size:16px">в¬ҶпёҸ</span> at the bottom, scroll down, and tap <b>вҖңAdd to Home Screen.вҖқ</b>'
      : android
      ? 'Tap the <b>вӢ® menu</b> (top-right of Chrome) and choose <b>вҖңInstall appвҖқ</b> (or <b>вҖңAdd to Home screenвҖқ</b>).'
      : 'Click the <b>install icon</b> in the address bar, or your browser menu вҶ’ <b>вҖңInstall Pom Pond.вҖқ</b>';
    openSheet(`<h3>рҹ“І Add Pom Pond to your phone</h3>
      <p style="font-weight:700;color:var(--soft);font-size:14px;line-height:1.55;margin-top:-6px">${steps}</p>
      <p style="font-weight:700;color:var(--soft);font-size:13px">It then opens full-screen like a real app вҖ” with its own icon on your home screen.</p>
      <div class="sa"><button class="cancel">Got it рҹ‘Қ</button></div>`,s=>{s.querySelector(".cancel").onclick=closeSheet;});
  }

  /* ============================================================
     FX
     ============================================================ */
  function confetti(){const wrap=document.getElementById("burst");const set=["рҹҺү","вңЁ","рҹҗё","рҹҰҶ","рҹ’ӣ","рҹӘ·","вӯҗ"];
    for(let i=0;i<20;i++){const s=document.createElement("span");s.textContent=set[Math.floor(Math.random()*set.length)];
      s.style.left=Math.random()*100+"vw";s.style.fontSize=(20+Math.random()*22)+"px";s.style.animationDelay=(Math.random()*.4)+"s";
      wrap.appendChild(s);setTimeout(()=>s.remove(),1900);}}
  let actx;function beep(happy){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    (happy?[523,659,784,1047]:[880,660,880]).forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type="triangle";o.frequency.value=f;
      o.connect(g);g.connect(actx.destination);const t=actx.currentTime+i*.15;g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(.22,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.3);o.start(t);o.stop(t+.32);});}catch(e){}}
  function toast(msg){const t=document.createElement("div");t.textContent=msg;
    t.style.cssText="position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#23413E;color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;z-index:70;box-shadow:var(--shadow)";
    document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

  /* ============================================================
     PUBLIC BRIDGE for js/cloud.js (Firebase enhancement layer)
     ============================================================ */
  PP.render=render;
  PP.toast=toast;
  PP.getState=()=>fam;
  PP.localFamily=()=>Backend.loadLocal();
  PP.normalize=normalizeFam;
  PP.setCloud=(c)=>{ Backend.cloud=c; };
  PP.goLobby=()=>{ meId=null; view="lobby"; render(); };
  PP.openSheet=openSheet; PP.closeSheet=closeSheet;
  PP.applySnapshot=(f)=>{                       // cloud pushes new family state
    fam=normalizeFam(f);
    // A cloud family that isn't set up yet must run the welcome wizard, even if
    // stale local state left us on the lobby. This is what guarantees a parent
    // always chooses their own PIN before reaching the app (kids never onboard).
    const amParent = !Backend.cloud.isParent || Backend.cloud.isParent();
    if(!fam.setup && amParent){ meId=null; view="setup"; }
    else if(view==="setup" && fam.setup) view="lobby";
    if((view==="kid"||view==="parent") && !member(meId)) { meId=null; view="lobby"; }
    render();
  };
  PP.applyReveals=(critters)=>{                 // cloud hands us critters to show on this kid's screen
    if(!critters||!critters.length) return;
    revealQ=critters.slice();
    const kid=me();
    if(kid && view==="kid"){ playReveals(kid.id,()=>{ if((kid.choices||0)>0)choiceModal(kid); }); }
    else revealQ=[];
  };
  PP.boot=render;

  if(typeof window!=="undefined"&&window.addEventListener){
    window.addEventListener('pp-installable',()=>{ if(view==="lobby"||view==="kid")render(); });
    window.addEventListener('pp-installed',()=>render());
  }

  render();

})();
</script>

<!-- CLOUD: Firebase enhancement layer. Loaded ONLY when hosted; absent in the jsdom
     harness (no network), so the app stays in local mode and the harness stays green.
     No-ops gracefully if js/firebase-config.js still holds placeholder values. -->
<script type="module" src="js/cloud.js"></script>

<!-- PWA service worker вҖ” guarded so it never runs (or errors) under jsdom/file://. -->
<script>
  if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
</body>
</html>
